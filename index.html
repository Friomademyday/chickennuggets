<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbiting Sphere</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100vh;
            background-color: #000000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .canvas-container {
            width: 100%;
            height: 100%;
            max-width: 100vw;
            max-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div class="canvas-container">
        <canvas id="sphereCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('sphereCanvas');
        const ctx = canvas.getContext('2d');

        let width, height;

        function resizeCanvas() {
            const container = canvas.parentElement;
            width = container.clientWidth;
            height = container.clientHeight;
            
            canvas.width = width * window.devicePixelRatio;
            canvas.height = height * window.devicePixelRatio;
            
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        let angle = 0;

        const radius = Math.min(width, height) * 0.40;
        const latLines = 10;
        const lonLines = 16;

        function render() {
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, width, height);

            const centerX = width / 2;
            const centerY = height / 2;
            const currentRadius = Math.min(width, height) * 0.36;

            ctx.beginPath();
            ctx.arc(centerX, centerY, currentRadius, 0, Math.PI * 2);
            ctx.fillStyle = '#222222';
            ctx.fill();

            for (let i = 1; i < latLines; i++) {
                let phi = (i / latLines) * Math.PI - Math.PI / 2;
                let yOffset = currentRadius * Math.sin(phi);
                let ringRadius = currentRadius * Math.cos(phi);

                ctx.beginPath();
                ctx.ellipse(centerX, centerY + yOffset, ringRadius, ringRadius * 0.2, 0, 0, Math.PI * 2);
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 1;
                ctx.stroke();
            }

            for (let i = 0; i < lonLines; i++) {
                let theta = (i / lonLines) * Math.PI * 2 + angle;
                
                ctx.beginPath();
                for (let lat = -Math.PI / 2; lat <= Math.PI / 2; lat += 0.05) {
                    let x = currentRadius * Math.cos(lat) * Math.sin(theta);
                    let y = currentRadius * Math.sin(lat);
                    
                    let screenX = centerX + x;
                    let screenY = centerY + y;

                    if (lat === -Math.PI / 2) {
                        ctx.moveTo(screenX, screenY);
                    } else {
                        ctx.lineTo(screenX, screenY);
                    }
                }
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 1;
                ctx.stroke();
            }

            ctx.beginPath();
            ctx.arc(centerX, centerY, currentRadius, 0, Math.PI * 2);
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 2;
            ctx.stroke();

            angle += 0.0005;

            requestAnimationFrame(render);
        }

        render();
    </script>
</body>
</html>
