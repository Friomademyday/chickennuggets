<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Holographic Sphere</title>
<style>
  body { margin: 0; background: #05000f; overflow: hidden; }
  canvas { display: block; }
</style>
<script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
  }
}
</script>
</head>
<body>
<script type="module">
import * as THREE from 'three';

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 100);
camera.position.z = 3;

const renderer = new THREE.WebGLRenderer({antialias: true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Shader material for the glowing wave effect
const vertexShader = `
  uniform float time;
  varying vec3 vNormal;
  varying vec3 vPosition;
  void main() {
    vNormal = normal;
    vPosition = position;
    vec3 pos = position;
    float wave = sin(position.x * 5.0 + time) * 0.05;
    wave += cos(position.y * 4.0 + time * 0.8) * 0.05;
    pos += normal * wave;
    gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
  }
`;

const fragmentShader = `
  uniform float time;
  varying vec3 vNormal;
  varying vec3 vPosition;
  void main() {
    float glow = pow(0.6 - dot(vNormal, vec3(0.0, 0.0, 1.0)), 2.0);
    vec3 color1 = vec3(0.1, 0.6, 1.0); // cyan
    vec3 color2 = vec3(1.0, 0.2, 0.8); // magenta
    vec3 color3 = vec3(0.6, 0.1, 1.0); // violet
    float mixVal = sin(vPosition.x * 3.0 + time) * 0.5 + 0.5;
    vec3 color = mix(mix(color1, color2, mixVal), color3, sin(vPosition.y * 2.0 + time * 0.5) * 0.5 + 0.5);
    gl_FragColor = vec4(color + glow, 0.9);
  }
`;

const geometry = new THREE.SphereGeometry(1, 128, 128);
const material = new THREE.ShaderMaterial({
  uniforms: { time: { value: 0 } },
  vertexShader,
  fragmentShader,
  transparent: true,
  blending: THREE.AdditiveBlending,
  side: THREE.DoubleSide
});

const sphere = new THREE.Mesh(geometry, material);
scene.add(sphere);

// Add particle dots inside
const particleCount = 2000;
const particles = new THREE.BufferGeometry();
const positions = new Float32Array(particleCount * 3);
for(let i = 0; i < particleCount * 3; i++) {
  positions[i] = (Math.random() - 0.5) * 2;
}
particles.setAttribute('position', new THREE.BufferAttribute(positions, 3));
const particleMaterial = new THREE.PointsMaterial({color: 0xffffff, size: 0.01, transparent: true, opacity: 0.6});
const particleSystem = new THREE.Points(particles, particleMaterial);
scene.add(particleSystem);

const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  material.uniforms.time.value = clock.getElapsedTime();
  sphere.rotation.y += 0.002;
  sphere.rotation.x += 0.001;
  particleSystem.rotation.y -= 0.001;
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
