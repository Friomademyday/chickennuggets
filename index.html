<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glow Geodesic Icosphere</title>

    <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    html, body {
        width: 100%;
        height: 100vh;
        background: radial-gradient(circle at center, #051811 0%, #000000 75%);
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    canvas {
        display: block;
        width: 100%;
        height: 100%;
        /* Hardware-accelerated glow effect */
        filter: drop-shadow(0 0 8px rgba(0, 255, 119, 0.6));
        will-change: transform;
    }
    </style>

    
</head>
<body>
    <canvas id="sphereCanvas"></canvas>

    <script>
        const canvas = document.getElementById('sphereCanvas');
        const ctx = canvas.getContext('2d');

        let width, height;

        function resizeCanvas() {
    width = window.innerWidth;
    height = window.innerHeight;
    const dpr = window.devicePixelRatio || 1;
    canvas.width = width * dpr;
    canvas.height = height * dpr;
    ctx.scale(dpr, dpr);
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // 1. Generate Icosahedron Base
        function createIcosahedron() {
            const t = (1.0 + Math.sqrt(5.0)) / 2.0;
            let vertices = [
                [-1,  t,  0], [ 1,  t,  0], [-1, -t,  0], [ 1, -t,  0],
                [ 0, -1,  t], [ 0,  1,  t], [ 0, -1, -t], [ 0,  1, -t],
                [ t,  0, -1], [ t,  0,  1], [-t,  0, -1], [-t,  0,  1]
            ];

            // Normalize vertices to unit sphere
            vertices = vertices.map(v => {
                const len = Math.sqrt(v[0]*v[0] + v[1]*v[1] + v[2]*v[2]);
                return [v[0]/len, v[1]/len, v[2]/len];
            });

            let faces = [
                [0, 11, 5], [0, 5, 1], [0, 1, 7], [0, 7, 10], [0, 10, 11],
                [1, 5, 9], [5, 11, 4], [11, 10, 2], [10, 7, 6], [7, 1, 8],
                [3, 9, 4], [3, 4, 2], [3, 2, 6], [3, 6, 8], [3, 8, 9],
                [4, 9, 5], [2, 4, 11], [6, 2, 10], [8, 6, 7], [9, 8, 1]
            ];

            return { vertices, faces };
        }

        // 2. Subdivide Triangles to make smooth Icosphere
        function subdivide(geometry, subdivisions) {
            let { vertices, faces } = geometry;

            for (let s = 0; s < subdivisions; s++) {
                let newFaces = [];
                let midpointCache = {};

                function getMidpoint(p1Idx, p2Idx) {
                    const key = p1Idx < p2Idx ? `${p1Idx}_${p2Idx}` : `${p2Idx}_${p1Idx}`;
                    if (midpointCache[key] !== undefined) return midpointCache[key];

                    const p1 = vertices[p1Idx];
                    const p2 = vertices[p2Idx];
                    let mid = [
                        (p1[0] + p2[0]) / 2,
                        (p1[1] + p2[1]) / 2,
                        (p1[2] + p2[2]) / 2
                    ];

                    // Project to sphere surface
                    const len = Math.sqrt(mid[0]*mid[0] + mid[1]*mid[1] + mid[2]*mid[2]);
                    mid = [mid[0]/len, mid[1]/len, mid[2]/len];

                    vertices.push(mid);
                    const newIndex = vertices.length - 1;
                    midpointCache[key] = newIndex;
                    return newIndex;
                }

                faces.forEach(f => {
                    const a = getMidpoint(f[0], f[1]);
                    const b = getMidpoint(f[1], f[2]);
                    const c = getMidpoint(f[2], f[0]);

                    newFaces.push([f[0], a, c]);
                    newFaces.push([f[1], b, a]);
                    newFaces.push([f[2], c, b]);
                    newFaces.push([a, b, c]);
                });

                faces = newFaces;
            }

            return { vertices, faces };
        }

        // Build a 2-subdivision Icosphere
        const mesh = subdivide(createIcosahedron(), 3);

        // Extract Unique Edges for Drawing Lines
        const edgeSet = new Set();
        const edges = [];
        mesh.faces.forEach(f => {
            const addEdge = (v1, v2) => {
                const key = v1 < v2 ? `${v1}_${v2}` : `${v2}_${v1}`;
                if (!edgeSet.has(key)) {
                    edgeSet.add(key);
                    edges.push([v1, v2]);
                }
            };
            addEdge(f[0], f[1]);
            addEdge(f[1], f[2]);
            addEdge(f[2], f[0]);
        });

        let angleX = 0.2;
        let angleY = 0;

        function render() {
            ctx.clearRect(0, 0, width, height);

            const centerX = width / 2;
            const centerY = height / 2;
            const radius = Math.min(width, height) * 0.35;

            // 3D Rotation Transformations
            const cosX = Math.cos(angleX), sinX = Math.sin(angleX);
            const cosY = Math.cos(angleY), sinY = Math.sin(angleY);

            // Transform all vertices
            const projectedVertices = mesh.vertices.map(v => {
                // Rotate around Y
                let x1 = v[0] * cosY - v[2] * sinY;
                let z1 = v[0] * sinY + v[2] * cosY;

                // Rotate around X
                let y2 = v[1] * cosX - z1 * sinX;
                let z2 = v[1] * sinX + z1 * cosX;

                return {
                    x: centerX + x1 * radius,
                    y: centerY + y2 * radius,
                    z: z2 // Used for depth transparency
                };
            });

            const neonGreen = '#00ff77';

            // Draw Triangular Edges
            
            ctx.strokeStyle = neonGreen;

            edges.forEach(([v1Idx, v2Idx]) => {
                const v1 = projectedVertices[v1Idx];
                const v2 = projectedVertices[v2Idx];

                // Dim lines on the back side of the sphere to create depth
                const avgZ = (v1.z + v2.z) / 2;
                ctx.globalAlpha = avgZ > 0 ? Math.max(0.1, 1 - avgZ * 0.8) : 0.15;
                ctx.lineWidth = avgZ > 0 ? 1.2 : 0.6;

                ctx.beginPath();
                ctx.moveTo(v1.x, v1.y);
                ctx.lineTo(v2.x, v2.y);
                ctx.stroke();
            });

            // Draw Glowing Nodes at Triangle Vertices
            
            ctx.fillStyle = '#ffffff';

            projectedVertices.forEach(v => {
                // Only draw nodes facing front clearly
                if (v.z > -0.2) {
                    ctx.globalAlpha = Math.max(0.2, (v.z + 1) / 2);
                    ctx.beginPath();
                    ctx.arc(v.x, v.y, v.z > 0 ? 2.5 : 1.5, 0, Math.PI * 2);
                    ctx.fill();
                }
            });

            ctx.globalAlpha = 1.0;
            angleY += 0.003; // Auto-rotate horizontal

            requestAnimationFrame(render);
        }

        render();
    </script>
</body>
</html>
