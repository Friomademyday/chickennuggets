<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbiting Neon Sphere</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100vh;
            /* Added a subtle radial gradient for background depth */
            background: radial-gradient(circle at center, #0a1512 0%, #000000 70%);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .canvas-container {
            width: 100%;
            height: 100%;
            max-width: 100vw;
            max-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div class="canvas-container">
        <canvas id="sphereCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('sphereCanvas');
        const ctx = canvas.getContext('2d');

        let width, height;

        function resizeCanvas() {
            const container = canvas.parentElement;
            width = container.clientWidth;
            height = container.clientHeight;
            
            canvas.width = width * window.devicePixelRatio;
            canvas.height = height * window.devicePixelRatio;
            
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        let angle = 0;

        const radius = Math.min(width, height) * 0.40;
        const latLines = 10;
        const lonLines = 16;

        function render() {
            // Clear canvas completely to let the CSS background show through
            ctx.clearRect(0, 0, width, height);

            const centerX = width / 2;
            const centerY = height / 2;
            const currentRadius = Math.min(width, height) * 0.36;

            // Setup Neon Glow
            const neonColor = '#00ff88'; // Bright neon green
            ctx.shadowBlur = 10;
            ctx.shadowColor = neonColor;
            ctx.strokeStyle = neonColor;
            ctx.lineWidth = 1;

            // Optional: Inner dark circle to hide the background grid lines slightly
            ctx.beginPath();
            ctx.arc(centerX, centerY, currentRadius, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(0, 10, 5, 0.6)'; 
            ctx.fill();

            // Store node coordinates to draw the glowing dots later
            let nodes = [];

            // Draw Latitude Lines (Horizontal)
            for (let i = 1; i < latLines; i++) {
                let phi = (i / latLines) * Math.PI - Math.PI / 2;
                let yOffset = currentRadius * Math.sin(phi);
                let ringRadius = currentRadius * Math.cos(phi);

                ctx.beginPath();
                ctx.ellipse(centerX, centerY + yOffset, ringRadius, ringRadius * 0.2, 0, 0, Math.PI * 2);
                ctx.stroke();
            }

            // Draw Longitude Lines (Vertical)
            for (let i = 0; i < lonLines; i++) {
                let theta = (i / lonLines) * Math.PI * 2 + angle;
                
                ctx.beginPath();
                for (let lat = -Math.PI / 2; lat <= Math.PI / 2; lat += 0.05) {
                    let x = currentRadius * Math.cos(lat) * Math.sin(theta);
                    let y = currentRadius * Math.sin(lat);
                    
                    let screenX = centerX + x;
                    let screenY = centerY + y;

                    if (lat === -Math.PI / 2) {
                        ctx.moveTo(screenX, screenY);
                    } else {
                        ctx.lineTo(screenX, screenY);
                    }
                }
                ctx.stroke();

                // Calculate node positions along this longitude
                for (let j = 1; j < latLines; j++) {
                    let phi = (j / latLines) * Math.PI - Math.PI / 2;
                    let x = currentRadius * Math.cos(phi) * Math.sin(theta);
                    // Match the 2D tilt of the latitude ellipses (0.2 ratio)
                    let y = currentRadius * Math.sin(phi) + (currentRadius * Math.cos(phi) * 0.2 * Math.cos(theta));
                    
                    nodes.push({x: centerX + x, y: centerY + y});
                }
            }

            // Draw Outer Border
            ctx.beginPath();
            ctx.arc(centerX, centerY, currentRadius, 0, Math.PI * 2);
            ctx.lineWidth = 1.5;
            ctx.stroke();

            // Draw the Glowing Vertices (Dots)
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#ffffff'; 
            ctx.fillStyle = '#ffffff'; // White core for the dots

            nodes.forEach(node => {
                ctx.beginPath();
                ctx.arc(node.x, node.y, 2, 0, Math.PI * 2);
                ctx.fill();
            });

            angle += 0.0005;

            requestAnimationFrame(render);
        }

        render();
    </script>
</body>
</html>
